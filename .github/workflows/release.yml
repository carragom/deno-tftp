name: Release

on:
   push:
      tags:
         - 'v*.*.*'
   workflow_dispatch:

jobs:
   test:
      uses: ./.github/workflows/test.yml

   publish:
      needs: test
      runs-on: ubuntu-latest
      permissions:
         contents: read
         id-token: write
      steps:
         - name: Check out repository
           uses: actions/checkout@v6

         - name: Set up Deno
           uses: denoland/setup-deno@v2
           with:
              deno-version: v2.x

         - name: Publish to JSR
           run: deno publish
