name: Shared Test

on:
   workflow_call:
   workflow_dispatch:

jobs:
   test:
      runs-on: ubuntu-latest
      steps:
         - name: Install interop packages
           run: |
              sudo apt update
              sudo apt install -y atftp atftpd tftp-hpa

         - name: Check out repository
           uses: actions/checkout@v6

         - name: Set up Deno
           uses: denoland/setup-deno@v2
           with:
              deno-version: v2.x

         - name: Format check
           run: deno fmt --check

         - name: Lint check
           run: deno lint

         - name: Type check
           run: deno check

         - name: Prepare external server fixture
           run: mkdir -p .tmp/atftpd && printf 'hello\n' > .tmp/atftpd/hello.txt

         - name: Run test suite
           env:
              TEST_INTEROP_SERVER: 127.0.0.1:1069
              TEST_INTEROP_CLIENT: yes
           run: |
              set -euo pipefail
              root_dir="$(pwd)/.tmp/atftpd"
              atftpd --daemon --bind-address 127.0.0.1 --port 1069 "$root_dir"
              trap "pkill -f 'atftpd --daemon --bind-address 127.0.0.1 --port 1069 $root_dir' || true" EXIT
              sleep 1
              deno test -P --parallel
